<script type="text/javascript">
  RED.nodes.registerType('dvgroup-api-bridge', {
    category: 'function',
    color: '#7faedb',
    icon: 'dvgroup.svg',
    labelStyle: {
      align: 'right',
    },
    defaults: {
      name: { value: 'DVGroup API' },
      dvgroup: { type: 'dvgroup-api-credentials', required: true },
      projectCode: {
        required: true,
        validate: RED.validators.regex(/[a-z0-9]+/),
      },
      organisationId: {
        required: true,
        validate: RED.validators.regex(
          /^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89AB][0-9a-f]{3}-[0-9a-f]{12}$/i,
        ),
      },
      baseURL: {
        required: true,
        value: 'https://api.diagrams-technologies.com/v0',
        validate: RED.validators.regex(/^https?:\/\//),
      },
    },
    inputs: 1,
    outputs: 0,
    label: function () {
      return this.name || 'dvgroup-api-bridge';
    },
  });
</script>

<script type="text/html" data-template-name="dvgroup-api-bridge">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="Name" />
  </div>
  <div class="form-row">
    <label for="node-input-dvgroup"
      ><i class="fa fa-user"></i> DVGroup API Credentials</label
    >
    <input type="text" id="node-input-dvgroup" />
  </div>
  <div class="form-row">
    <label for="node-input-projectCode"
      ><i class="fa fa-tag"></i> Project Code</label
    >
    <input type="text" id="node-input-projectCode" />
  </div>
  <div class="form-row">
    <label for="node-input-organisationId"
      ><i class="fa fa-tag"></i> Organisation Id</label
    >
    <input type="text" id="node-input-organisationId" />
  </div>
  <div class="form-row">
    <label for="node-input-baseURL"><i class="fa fa-tag"></i> Base URL</label>
    <input type="text" id="node-input-baseURL" />
  </div>
</script>

</script>
